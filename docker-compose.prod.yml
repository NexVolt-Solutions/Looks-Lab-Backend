services:
  db:
    image: postgres:16-alpine
    container_name: lookslab_db
    environment:
      POSTGRES_USER: looks_lab
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: looks_lab
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U looks_lab -d looks_lab"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - lookslab_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: lookslab_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lookslab_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: lookslab_app
    env_file: .env.production
    environment:
      DATABASE_URI: postgresql+asyncpg://looks_lab:${DB_PASSWORD}@db:5432/looks_lab
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - lookslab_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  lookslab_network:
    driver: bridge
    
    